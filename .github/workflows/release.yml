name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n ' < version.txt)"
          MANIFEST_VERSION="$(python -c 'import json; print(json.load(open("custom_components/threecx/manifest.json", encoding="utf-8"))["version"])')"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "version.txt and manifest.json do not match" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match v${VERSION}" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create version tag when missing
        if: github.ref_type == 'branch' && github.ref_name == 'main'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; no new tag required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"

      - name: Build HACS release ZIP
        shell: bash
        run: |
          mkdir -p dist
          cd custom_components/threecx
          zip -r "../../dist/threecx.zip" . -x "*/__pycache__/*" "*.pyc"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: threecx-${{ steps.version.outputs.version }}
          path: dist/threecx.zip

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: 3CX Home Assistant ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/threecx.zip
