name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: threecx-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read and validate version, domain and HACS layout
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n ' < version.txt)"
          MANIFEST_VERSION="$(python -c 'import json; print(json.load(open("custom_components/threecx/manifest.json", encoding="utf-8"))["version"])')"
          MANIFEST_DOMAIN="$(python -c 'import json; print(json.load(open("custom_components/threecx/manifest.json", encoding="utf-8"))["domain"])')"
          python - <<'PY'
          import json
          with open("hacs.json", encoding="utf-8") as handle:
              data = json.load(handle)
          assert data.get("domains") == ["threecx"]
          assert data.get("content_in_root") is False
          assert "zip_release" not in data
          assert "filename" not in data
          PY
          test -f custom_components/threecx/manifest.json
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "version.txt and manifest.json do not match" >&2
            exit 1
          fi
          if [ "$MANIFEST_DOMAIN" != "threecx" ]; then
            echo "manifest domain is not threecx" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate Python and JSON
        shell: bash
        run: |
          python -m compileall -q custom_components/threecx
          python -m json.tool custom_components/threecx/manifest.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Publish or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: 3CX Home Assistant ${{ steps.version.outputs.version }}
          generate_release_notes: true
